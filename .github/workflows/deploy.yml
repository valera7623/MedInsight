name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-medinsight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test
        run: python -c "from app.main import app; print('OK', app.title)"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          GH_REPO: valera7623/Medinsight
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          APP_PORT: ${{ secrets.APP_PORT }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: GH_REPO,APP_SECRET_KEY,APP_PORT,CORS_ORIGINS
          script: |
            set -euo pipefail

            APP_DIR="$HOME/medinsight"
            REPO_URL="https://github.com/${GH_REPO}.git"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d .git ]; then
              git init -b main
              git remote add origin "$REPO_URL"
            fi

            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            if [ -n "${APP_SECRET_KEY:-}" ]; then
              sed -i "s|^SECRET_KEY=.*|SECRET_KEY=${APP_SECRET_KEY}|" .env
            fi

            if [ -n "${APP_PORT:-}" ]; then
              sed -i "s|^APP_PORT=.*|APP_PORT=${APP_PORT}|" .env
            else
              sed -i 's|^APP_PORT=.*|APP_PORT=8000|' .env 2>/dev/null || echo "APP_PORT=8000" >> .env
            fi

            if [ -n "${CORS_ORIGINS:-}" ]; then
              sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=${CORS_ORIGINS}|" .env
            fi

            sed -i 's|^DATABASE_URL=.*|DATABASE_URL=sqlite:////app/data/medinsight.db|' .env

            mkdir -p storage
            chmod +x deploy.sh scripts/*.sh 2>/dev/null || true
            ./deploy.sh production

            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
