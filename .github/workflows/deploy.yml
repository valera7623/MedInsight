name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-medinsight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
          poetry install --with test --no-interaction --no-ansi
          poetry run pip install "pydicom>=2.4.0"

      - name: Run tests
        run: poetry run pytest tests/ -q --cov=app --cov-fail-under=45

      - name: Smoke test
        run: |
          poetry run python -c "from app.main import app; print('OK', app.title)"
          poetry run python -c "import pydicom, numpy; from PIL import Image; print('DICOM deps OK', pydicom.__version__)"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          GH_REPO: valera7623/Medinsight
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          APP_PORT: ${{ secrets.APP_PORT }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          envs: GH_REPO,APP_SECRET_KEY,APP_PORT,CORS_ORIGINS,POSTGRES_PASSWORD
          script: |
            set -euo pipefail

            APP_DIR="$HOME/medinsight"
            REPO_URL="https://github.com/${GH_REPO}.git"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d .git ]; then
              git init -b main
              git remote add origin "$REPO_URL"
            fi

            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            if [ -n "${APP_SECRET_KEY:-}" ]; then
              sed -i "s|^SECRET_KEY=.*|SECRET_KEY=${APP_SECRET_KEY}|" .env
            fi

            if [ -n "${APP_PORT:-}" ]; then
              sed -i "s|^APP_PORT=.*|APP_PORT=${APP_PORT}|" .env
            else
              sed -i 's|^APP_PORT=.*|APP_PORT=8000|' .env 2>/dev/null || echo "APP_PORT=8000" >> .env
            fi

            if [ -n "${CORS_ORIGINS:-}" ]; then
              sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=${CORS_ORIGINS}|" .env
            fi

            if [ -n "${POSTGRES_PASSWORD:-}" ]; then
              sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${POSTGRES_PASSWORD}|" .env
              PG_URL="postgresql://medinsight:${POSTGRES_PASSWORD}@postgres:5432/medinsight"
              sed -i "s|^PRODUCTION_DATABASE_URL=.*|PRODUCTION_DATABASE_URL=${PG_URL}|" .env
              sed -i "s|^DATABASE_URL=.*|DATABASE_URL=${PG_URL}|" .env
            fi

            mkdir -p storage
            chmod +x deploy.sh scripts/*.sh 2>/dev/null || true
            ./deploy.sh production

            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

            curl -sf "http://127.0.0.1:${APP_PORT:-8000}/health/ready" || exit 1

            # Demo stack (separate DB; shares Traefik). Requires DNS:
            # A-record demo.fileguardian.com.ru → this VPS.
            ./deploy.sh demo
            docker compose -f docker-compose.demo.yml -p medinsight-demo ps
