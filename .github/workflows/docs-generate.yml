name: Generate API Docs

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs-generate.yml"
      - "scripts/generate_api_docs.py"
      - "scripts/api_docs_config.py"
      - "scripts/update_mkdocs_nav.py"
      - "scripts/templates/**"
      - "pyproject.toml"
      - "poetry.lock"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: poetry-docs-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-docs-${{ runner.os }}-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
          poetry install --without dev,test --with docs --no-interaction --no-ansi

      - name: Generate API Markdown and MkDocs site
        run: |
          poetry run python scripts/generate_api_docs.py --import-app --update-nav
          poetry run mkdocs build

      - name: Commit generated docs and site/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/*.en.md mkdocs.yml site/
          git status
          if git diff --staged --quiet; then
            echo "No documentation changes to commit."
          else
            git commit -m "docs: regenerate API reference and MkDocs site"
            git push
          fi
