name: Generate API Docs

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/generate_api_docs.py"
      - "scripts/api_docs_config.py"
      - "scripts/update_mkdocs_nav.py"
      - "scripts/templates/**"
      - "requirements.txt"
      - "requirements-docs.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-docs.txt

      - name: Generate API Markdown and MkDocs site
        run: |
          python scripts/generate_api_docs.py --import-app --cache --update-nav
          mkdocs build

      - name: Commit generated docs and site/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/*.en.md mkdocs.yml site/
          if git diff --staged --quiet; then
            echo "No documentation changes to commit."
          else
            git commit -m "docs: regenerate API reference and MkDocs site"
            git push
          fi
