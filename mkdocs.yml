site_name: MedInsight Documentation
site_description: Clinical analytics — guides for users, administrators, and developers
site_url: https://fileguardian.com.ru/help/
repo_url: https://github.com/valera7623/MedInsight
repo_name: valera7623/MedInsight

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: ru
          default: true
          name: Русский
          build: true
          site_name: MedInsight — документация
          site_description: Клиническая аналитика — руководства для пользователей, администраторов и разработчиков
          theme:
            language: ru
        - locale: en
          name: English
          build: true
          site_name: MedInsight Documentation
          site_description: Clinical analytics — guides for users, administrators, and developers
          theme:
            language: en
          nav_translations:
            Главная: Home
            Руководство пользователя: User Guide
            Руководство администратора: Admin Guide
            Руководство разработчика: Developer Guide
            API: API
            Деплой: Deployment
            Дополнительно: More
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Руководство пользователя:
      - user-guide/getting-started.md
      - user-guide/patients.md
      - user-guide/documents.md
      - user-guide/dicom.md
      - user-guide/analytics.md
      - user-guide/predictions.md
  - Руководство администратора:
      - admin-guide/deployment.md
      - admin-guide/configuration.md
      - admin-guide/backup.md
      - admin-guide/monitoring.md
  - Руководство разработчика:
      - developer-guide/architecture.md
      - developer-guide/database-schema.md
      - developer-guide/agents.md
      - developer-guide/self-healing.md
  - API:
      - api/index.md
      - api/auth.md
      - api/patients.md
      - api/documents.md
      - api/dicom.md
      - api/analytics.md
      - api/predictions.md
      - api/exports.md
      - api/webhooks.md
      - api/payments.md
      - api/admin.md
      - api/websocket.md
  - Деплой:
      - deployment/docker.md
      - deployment/vps.md
      - deployment/ci-cd.md
      - deployment/environment-variables.md
  - Дополнительно:
      - misc/changelog.md
      - misc/roadmap.md
      - misc/faq.md
      - misc/glossary.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/valera7623/MedInsight

extra_javascript:
  - javascripts/lang-redirect.js
