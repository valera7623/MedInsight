# Traefik dynamic configuration (file provider).
# Routes the MedInsight app behind HTTPS without using the Docker socket
# provider (which fails Docker API version negotiation on newer daemons).
# Traefik reaches the app over the shared Docker network by its service name.
http:
  routers:
    medinsight:
      rule: "Host(`fileguardian.com.ru`)"
      entryPoints:
        - websecure
      service: medinsight
      middlewares:
        - security-headers
      tls:
        certResolver: letsencrypt

    medinsight-http:
      rule: "Host(`fileguardian.com.ru`)"
      entryPoints:
        - web
      service: medinsight
      middlewares:
        - redirect-https

    medinsight-demo:
      rule: "Host(`demo.fileguardian.com.ru`)"
      entryPoints:
        - websecure
      service: medinsight-demo
      middlewares:
        - security-headers
      tls:
        certResolver: letsencrypt

    medinsight-demo-http:
      rule: "Host(`demo.fileguardian.com.ru`)"
      entryPoints:
        - web
      service: medinsight-demo
      middlewares:
        - redirect-https

  services:
    medinsight:
      loadBalancer:
        servers:
          - url: "http://app:8000"

    medinsight-demo:
      loadBalancer:
        servers:
          # container_name from docker-compose.demo.yml (shared traefik-net)
          - url: "http://medinsight-demo-app:8000"

  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
