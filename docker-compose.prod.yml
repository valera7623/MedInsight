services:
  app:
    container_name: medinsight-app
    restart: unless-stopped
    # Port mapping (incl. :80) is defined in the base docker-compose.yml so the
    # domain works under any `docker compose up`, dev or prod.
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      STORAGE_PATH: /app/storage
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
      - ./temp/dicom_zip:/app/temp/dicom_zip
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data

  celery_worker:
    container_name: medinsight-celery-worker
    restart: unless-stopped
    command: ["bash", "scripts/start_celery_worker.sh"]
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      STORAGE_PATH: /app/storage
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ENCRYPTION_KEY_PATH: /app/secrets/encryption_key.txt
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
      - ./temp/dicom_zip:/app/temp/dicom_zip
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data

  celery_beat:
    container_name: medinsight-celery-beat
    restart: unless-stopped
    command: ["bash", "scripts/start_celery_beat.sh"]
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data

volumes:
  medinsight-data:
  medinsight-chroma:
