services:
  app:
    container_name: medinsight-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
      - "80:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      STORAGE_PATH: /app/storage
    volumes:
      - ./storage:/app/storage
      - medinsight-data:/app/data

volumes:
  medinsight-data:
