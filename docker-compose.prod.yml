services:
  app:
    container_name: medinsight-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${PRODUCTION_DATABASE_URL:-postgresql://medinsight:secure_password@postgres:5432/medinsight}
      STORAGE_PATH: /app/storage
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
      - ./temp/dicom_zip:/app/temp/dicom_zip
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  celery_worker:
    restart: unless-stopped
    command: ["bash", "scripts/start_celery_worker.sh"]
    environment:
      DATABASE_URL: ${PRODUCTION_DATABASE_URL:-postgresql://medinsight:secure_password@postgres:5432/medinsight}
      STORAGE_PATH: /app/storage
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-2}
      DICOM_3D_SYNC_BUILD_MAX_SLICES: ${DICOM_3D_SYNC_BUILD_MAX_SLICES:-0}
      DICOM_ZIP_PARSE_WORKERS: ${DICOM_ZIP_PARSE_WORKERS:-2}
      ENCRYPTION_KEY_PATH: /app/secrets/encryption_key.txt
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
      - ./temp/dicom_zip:/app/temp/dicom_zip
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data

  celery_beat:
    container_name: medinsight-celery-beat
    restart: unless-stopped
    command: ["bash", "scripts/start_celery_beat.sh"]
    environment:
      DATABASE_URL: ${PRODUCTION_DATABASE_URL:-postgresql://medinsight:secure_password@postgres:5432/medinsight}
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data

  redis:
    ports: []

volumes:
  medinsight-data:
  medinsight-chroma:
