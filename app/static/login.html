<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedInsight — Вход</title>
  <link rel="stylesheet" href="/static/styles/themes.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/components/theme-toggle.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card" style="position:relative">
    <div style="position:absolute;top:1rem;right:1rem" data-theme-toggle></div>
    <div class="auth-logo">
      <h1>MedInsight</h1>
      <p>Клиническая аналитика</p>
    </div>

    <div id="demo-login-hint" class="hidden" style="margin-bottom:1rem;padding:0.85rem 1rem;border-radius:10px;background:rgba(37,99,235,0.12);border:1px solid rgba(96,165,250,0.35);color:var(--text-secondary);font-size:0.9rem;line-height:1.45">
      <strong style="color:var(--accent-primary)">Демо-вход</strong><br>
      Email: <code>demo@medinsight.com</code> · Пароль: <code>demo123</code> · Клиника: <code>clinic-1</code>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="subdomain">Клиника (subdomain)</label>
        <select id="subdomain" required></select>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="doctor@clinic.ru">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <div id="login-error" class="error-message hidden"></div>
      <div id="totp-group" class="form-group hidden">
        <label for="totp-code">Код 2FA</label>
        <input type="text" id="totp-code" inputmode="numeric" autocomplete="one-time-code" placeholder="000000" maxlength="8">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Войти</button>
      <p style="margin-top:0.75rem;text-align:center;font-size:0.9rem">
        <a href="#" id="show-forgot">Забыли пароль?</a>
      </p>
    </form>

    <form id="forgot-form" class="hidden">
      <div class="form-group">
        <label for="forgot-subdomain">Клиника</label>
        <select id="forgot-subdomain" required></select>
      </div>
      <div class="form-group">
        <label for="forgot-email">Email</label>
        <input type="email" id="forgot-email" required>
      </div>
      <div id="forgot-error" class="error-message hidden"></div>
      <div id="forgot-success" class="hidden" style="margin:0.75rem 0;padding:0.75rem;border-radius:8px;background:var(--bg-hover);color:var(--text-secondary);font-size:0.9rem"></div>
      <button type="submit" class="btn btn-primary btn-block">Отправить ссылку</button>
      <button type="button" class="btn btn-secondary btn-block" id="forgot-back">Назад к входу</button>
    </form>

    <div class="auth-footer">
      <p>Нет аккаунта? <a href="#" id="show-register">Зарегистрироваться</a></p>
      <p><a href="/help/" target="_blank" rel="noopener">Документация</a> · <a href="/docs" target="_blank" rel="noopener">API</a></p>
    </div>

    <form id="register-form" class="hidden">
      <div class="form-group">
        <label for="reg-subdomain">Клиника</label>
        <select id="reg-subdomain" required></select>
      </div>
      <div class="form-group">
        <label for="reg-full-name">ФИО</label>
        <input type="text" id="reg-full-name" required placeholder="Иванов Иван">
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" required>
      </div>
      <div class="form-group">
        <label for="reg-password">Пароль</label>
        <input type="password" id="reg-password" required minlength="8">
      </div>
      <div class="form-group">
        <label for="reg-role">Роль</label>
        <select id="reg-role">
          <option value="doctor">Врач</option>
          <option value="nurse">Медсестра</option>
          <option value="researcher">Исследователь</option>
          <option value="viewer">Наблюдатель</option>
        </select>
        <p id="reg-role-hint" class="text-muted" style="font-size:0.82rem;margin-top:0.4rem;line-height:1.4"></p>
      </div>
      <div class="form-group hidden" id="reg-department-group">
        <label for="reg-department">Отделение</label>
        <select id="reg-department"></select>
      </div>
      <div id="register-error" class="error-message hidden"></div>
      <div id="register-success" class="hidden" style="margin:0.75rem 0;padding:0.75rem;border-radius:8px;background:var(--bg-hover);color:var(--text-secondary);font-size:0.9rem;line-height:1.45"></div>
      <button type="submit" class="btn btn-primary btn-block">Создать аккаунт</button>
      <button type="button" class="btn btn-secondary btn-block" id="show-login">Назад к входу</button>
    </form>
  </div>

  <script>
    const API = '';

    if (localStorage.getItem('token')) {
      window.location.href = '/';
    }

    async function loadTenants() {
      const res = await fetch(`${API}/api/auth/tenants`);
      const tenants = await res.json();
      ['subdomain', 'reg-subdomain', 'forgot-subdomain'].forEach(id => {
        const sel = document.getElementById(id);
        if (!sel) return;
        sel.innerHTML = '';
        tenants.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.subdomain;
          opt.textContent = `${t.name} (${t.subdomain})`;
          opt.dataset.id = t.id;
          sel.appendChild(opt);
        });
      });
      return tenants;
    }

    const demoParams = new URLSearchParams(window.location.search);
    const isDemoLogin = demoParams.get('demo') === '1' || window.location.hostname.startsWith('demo.');

    fetch(`${API}/api/auth/capabilities`).then(r => r.json()).then(cap => {
      if (!cap.password_reset_available) {
        document.getElementById('show-forgot')?.classList.add('hidden');
      }
    }).catch(() => {});

    loadTenants().then((tenants) => {
      if (!isDemoLogin) return;
      localStorage.setItem('demo_mode', 'true');
      document.getElementById('demo-login-hint')?.classList.remove('hidden');
      document.querySelector('.auth-footer')?.classList.add('hidden');
      document.getElementById('register-form')?.classList.add('hidden');
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const subdomain = document.getElementById('subdomain');
      if (email) email.value = 'demo@medinsight.com';
      if (password) password.value = 'demo123';
      if (subdomain) {
        const clinic = Array.from(subdomain.options).find(o => o.value === 'clinic-1');
        if (clinic) subdomain.value = 'clinic-1';
        else if (tenants?.length) subdomain.value = tenants[0].subdomain;
      }
    });

    const ROLE_HINTS = {
      doctor: 'Работа с пациентами: создание карточек, документы, прогнозы.',
      nurse: 'Просмотр пациентов своего отделения, экспорт отчётов.',
      researcher: 'Доступ ко всей клинике для анализа. Только чтение.',
      viewer: 'Просмотр всех пациентов клиники. Без создания и изменений.',
    };
    const ROLES_NEED_DEPT = new Set(['doctor', 'nurse']);
    const ROLES_DEPT_REQUIRED = new Set(['nurse']);

    function updateRoleHint() {
      const role = document.getElementById('reg-role').value;
      document.getElementById('reg-role-hint').textContent = ROLE_HINTS[role] || '';
      const deptGroup = document.getElementById('reg-department-group');
      const deptSelect = document.getElementById('reg-department');
      if (ROLES_NEED_DEPT.has(role)) {
        deptGroup.classList.remove('hidden');
        deptSelect.required = ROLES_DEPT_REQUIRED.has(role);
      } else {
        deptGroup.classList.add('hidden');
        deptSelect.required = false;
        deptSelect.value = '';
      }
    }

    async function loadDepartmentsForRegister(subdomain) {
      const sel = document.getElementById('reg-department');
      sel.innerHTML = '<option value="">— Выберите отделение —</option>';
      if (!subdomain) return;
      try {
        const res = await fetch(`${API}/api/auth/departments?subdomain=${encodeURIComponent(subdomain)}`);
        const depts = await res.json();
        depts.forEach(d => {
          const opt = document.createElement('option');
          opt.value = String(d.id);
          opt.textContent = d.name;
          sel.appendChild(opt);
        });
      } catch (e) {
        console.error('departments', e);
      }
    }

    document.getElementById('reg-role').addEventListener('change', updateRoleHint);
    document.getElementById('reg-subdomain').addEventListener('change', (e) => {
      loadDepartmentsForRegister(e.target.value);
    });
    updateRoleHint();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');

      const subdomain = document.getElementById('subdomain').value;
      const tenantOpt = document.getElementById('subdomain').selectedOptions[0];

      try {
        const totpEl = document.getElementById('totp-code');
        const totpCode = totpEl && !document.getElementById('totp-group').classList.contains('hidden')
          ? totpEl.value.trim() : null;
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            subdomain,
            totp_code: totpCode || undefined,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка входа');
        if (data.totp_required) {
          document.getElementById('totp-group').classList.remove('hidden');
          totpEl?.focus();
          errEl.textContent = 'Введите код двухфакторной аутентификации';
          errEl.classList.remove('hidden');
          return;
        }
        localStorage.setItem('token', data.access_token);
        if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
        localStorage.setItem('tenant_id', String(data.tenant_id || tenantOpt.dataset.id));
        localStorage.setItem('role', data.role);
        if (data.demo_mode || isDemoLogin) localStorage.setItem('demo_mode', 'true');
        window.location.href = '/';
      } catch (err) {
        if (err.message && err.message.includes('Подтвердите email')) {
          errEl.innerHTML = err.message + ' <a href="/verify-email">Повторить подтверждение</a>';
        } else {
          errEl.textContent = err.message;
        }
        errEl.classList.remove('hidden');
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('register-error');
      const okEl = document.getElementById('register-success');
      errEl.classList.add('hidden');
      okEl.classList.add('hidden');
      const subdomain = document.getElementById('reg-subdomain').value;
      const tenantOpt = document.getElementById('reg-subdomain').selectedOptions[0];

      try {
        const role = document.getElementById('reg-role').value;
        const body = {
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value,
          full_name: document.getElementById('reg-full-name').value,
          role,
          subdomain,
        };
        const deptId = document.getElementById('reg-department').value;
        if (deptId) body.department_id = parseInt(deptId, 10);

        const res = await fetch(`${API}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка регистрации');

        if (data.email_verification_required) {
          okEl.innerHTML = 'Аккаунт создан. Мы отправили письмо с ссылкой для подтверждения на <strong>'
            + body.email + '</strong>. Откройте письмо и перейдите по ссылке, затем войдите.';
          okEl.classList.remove('hidden');
          document.getElementById('register-form').querySelector('button[type="submit"]').disabled = true;
          return;
        }

        const loginRes = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value,
            subdomain,
          }),
        });
        const loginData = await loginRes.json();
        localStorage.setItem('token', loginData.access_token);
        if (loginData.refresh_token) localStorage.setItem('refresh_token', loginData.refresh_token);
        localStorage.setItem('tenant_id', String(loginData.tenant_id || tenantOpt.dataset.id));
        localStorage.setItem('role', loginData.role);
        window.location.href = '/';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    });

    document.getElementById('show-register').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('forgot-form').classList.add('hidden');
      document.getElementById('register-form').classList.remove('hidden');
      document.querySelector('.auth-footer').classList.add('hidden');
      const sub = document.getElementById('reg-subdomain').value;
      loadDepartmentsForRegister(sub);
      updateRoleHint();
    });

    document.getElementById('show-login').addEventListener('click', () => {
      document.getElementById('register-form').classList.add('hidden');
      document.getElementById('forgot-form').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
      document.querySelector('.auth-footer').classList.remove('hidden');
    });

    document.getElementById('show-forgot').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('forgot-form').classList.remove('hidden');
      document.querySelector('.auth-footer').classList.add('hidden');
    });

    document.getElementById('forgot-back').addEventListener('click', () => {
      document.getElementById('forgot-form').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
      document.querySelector('.auth-footer').classList.remove('hidden');
    });

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('forgot-error');
      const okEl = document.getElementById('forgot-success');
      errEl.classList.add('hidden');
      okEl.classList.add('hidden');
      try {
        const res = await fetch(`${API}/api/auth/request-reset`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('forgot-email').value,
            subdomain: document.getElementById('forgot-subdomain').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка запроса');
        okEl.textContent = 'Если аккаунт существует, инструкции отправлены на email.';
        okEl.classList.remove('hidden');
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
