<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedInsight — DICOM 3D Viewer</title>
  <link rel="stylesheet" href="/static/styles/themes.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/components/theme-toggle.js"></script>
  <script src="/static/components/demo-banner.js"></script>
</head>
<body class="dicom-3d-body">
  <nav class="navbar">
    <div class="nav-brand">MedInsight 3D</div>
    <div class="nav-links">
      <a href="#" id="back-to-2d">← 2D Viewer</a>
      <a href="/dicom">К списку</a>
    </div>
    <div class="nav-actions">
      <div data-theme-toggle></div>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Выйти</button>
    </div>
  </nav>

  <div class="dicom-3d-layout">
    <section class="dicom-3d-main" id="vr-viewport">
      <div class="dicom-3d-panel-header">
        <span id="vr-panel-title">MIP — проекция объёма</span>
        <span class="dicom-3d-status" id="volume-status">Загрузка…</span>
      </div>
      <div class="dicom-3d-viewport" id="vr-viewport-wrap">
        <canvas id="vr-fallback-canvas" class="dicom-3d-fallback"></canvas>
      </div>
    </section>

    <aside class="dicom-3d-mpr">
      <div class="dicom-3d-mpr-panel" data-plane="axial">
        <div class="dicom-3d-panel-header">Axial</div>
        <div class="dicom-3d-mpr-viewport">
          <canvas class="dicom-3d-mpr-canvas" id="mpr-axial"></canvas>
        </div>
        <input type="range" class="dicom-3d-slice-slider" id="slice-axial" min="0" max="0" value="0">
      </div>
      <div class="dicom-3d-mpr-panel" data-plane="coronal">
        <div class="dicom-3d-panel-header">Coronal</div>
        <div class="dicom-3d-mpr-viewport">
          <canvas class="dicom-3d-mpr-canvas" id="mpr-coronal"></canvas>
        </div>
        <input type="range" class="dicom-3d-slice-slider" id="slice-coronal" min="0" max="0" value="0">
      </div>
      <div class="dicom-3d-mpr-panel" data-plane="sagittal">
        <div class="dicom-3d-panel-header">Sagittal</div>
        <div class="dicom-3d-mpr-viewport">
          <canvas class="dicom-3d-mpr-canvas" id="mpr-sagittal"></canvas>
        </div>
        <input type="range" class="dicom-3d-slice-slider" id="slice-sagittal" min="0" max="0" value="0">
      </div>
    </aside>
  </div>

  <footer class="dicom-3d-toolbar-host" id="toolbar-host"></footer>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/toast.js"></script>
  <script src="/static/dashboard.js"></script>
  <script src="/static/dicom-wl-presets.js"></script>
  <script src="/static/dicom-3d-toolbar.js"></script>
  <script src="/static/dicom-3d-viewer.js"></script>
</body>
</html>
