<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedInsight — Подписка и тариф</title>
  <link rel="stylesheet" href="/static/styles/themes.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/components/theme-toggle.js"></script>
  <script src="/static/components/demo-banner.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">MedInsight</div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Меню" aria-expanded="false">☰</button>
    <div class="nav-links">
      <a href="/">Дашборд</a>
      <a href="/patients">Пациенты</a>
      <a href="/appointments">Приёмы</a>
      <a href="/dicom">DICOM</a>
      <a href="/subscription" class="active">Подписка</a>
      <a href="/admin" class="nav-admin-link hidden">Админ</a>
      <a href="/help/" target="_blank" rel="noopener">Документация</a>
      <a href="/docs" target="_blank" rel="noopener">API</a>
    </div>
    <div class="nav-actions">
      <div data-theme-toggle></div>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Выйти</button>
    </div>
  </nav>

  <main class="container">
    <header class="page-header">
      <h1>Подписка и тариф</h1>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="sub-plan">—</div>
        <div class="stat-label">Текущий тариф</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="sub-usage">—</div>
        <div class="stat-label">Анализов использовано</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="sub-remaining">—</div>
        <div class="stat-label">Осталось в этом месяце</div>
      </div>
    </div>

    <section class="recent-section">
      <h2>Доступные тарифы</h2>
      <div id="plans-list" class="plans-grid"></div>
      <p id="subscription-msg" class="text-muted" style="font-size:0.85rem;margin-top:0.75rem"></p>
    </section>
  </main>

  <script src="/static/dashboard.js"></script>
  <script src="/static/subscription.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => initSubscriptionPage());
  </script>
</body>
</html>
