<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedInsight — Сброс пароля</title>
  <link rel="stylesheet" href="/static/styles/themes.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/components/theme-toggle.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card" style="position:relative">
    <div style="position:absolute;top:1rem;right:1rem" data-theme-toggle></div>
    <div class="auth-logo">
      <h1>MedInsight</h1>
      <p>Новый пароль</p>
    </div>

    <form id="reset-form">
      <div class="form-group">
        <label for="password">Новый пароль</label>
        <input type="password" id="password" required minlength="8" placeholder="Минимум 8 символов">
      </div>
      <div class="form-group">
        <label for="password2">Повторите пароль</label>
        <input type="password" id="password2" required minlength="8">
      </div>
      <div id="reset-error" class="error-message hidden"></div>
      <div id="reset-success" class="hidden" style="margin:0.75rem 0;padding:0.75rem;border-radius:8px;background:var(--bg-hover);color:var(--text-secondary);font-size:0.9rem"></div>
      <button type="submit" class="btn btn-primary btn-block">Сохранить пароль</button>
    </form>

    <div class="auth-footer">
      <p><a href="/login">← Вернуться ко входу</a></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const form = document.getElementById('reset-form');
    const errEl = document.getElementById('reset-error');
    const okEl = document.getElementById('reset-success');

    if (!token) {
      errEl.textContent = 'Ссылка недействительна. Запросите сброс пароля снова.';
      errEl.classList.remove('hidden');
      form.querySelector('button').disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      okEl.classList.add('hidden');

      const p1 = document.getElementById('password').value;
      const p2 = document.getElementById('password2').value;
      if (p1 !== p2) {
        errEl.textContent = 'Пароли не совпадают';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: p1 }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.detail || 'Не удалось сменить пароль';
          errEl.classList.remove('hidden');
          return;
        }
        okEl.textContent = 'Пароль обновлён. Перенаправление на страницу входа…';
        okEl.classList.remove('hidden');
        form.classList.add('hidden');
        setTimeout(() => { window.location.href = '/login'; }, 2000);
      } catch {
        errEl.textContent = 'Ошибка сети. Попробуйте позже.';
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
