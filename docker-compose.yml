services:
  redis:
    image: redis:7-alpine
    container_name: medinsight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - medinsight-net

  app:
    build:
      context: .
      args:
        INSTALL_SPACY_MODEL: "0"
    container_name: medinsight-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      ENCRYPTION_KEY_PATH: /app/secrets/encryption_key.txt
      CHROMA_PERSIST_DIR: /app/chroma_data
      BACKUP_DIR: /backups
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
      - ./temp/dicom_zip:/app/temp/dicom_zip
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data
      - medinsight-backups:/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - medinsight-net

  celery_worker:
    build:
      context: .
      args:
        INSTALL_SPACY_MODEL: "0"
    container_name: medinsight-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      ENCRYPTION_KEY_PATH: /app/secrets/encryption_key.txt
      CHROMA_PERSIST_DIR: /app/chroma_data
      BACKUP_DIR: /backups
    command: ["bash", "scripts/start_celery_worker.sh"]
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
      - ./temp/dicom_zip:/app/temp/dicom_zip
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data
      - medinsight-backups:/backups
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - medinsight-net

  celery_beat:
    build:
      context: .
      args:
        INSTALL_SPACY_MODEL: "0"
    container_name: medinsight-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      CHROMA_PERSIST_DIR: /app/chroma_data
      BACKUP_DIR: /backups
    command: ["bash", "scripts/start_celery_beat.sh"]
    volumes:
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data
      - medinsight-backups:/backups
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - medinsight-net

  telegram_bot:
    build:
      context: .
      args:
        INSTALL_SPACY_MODEL: "0"
    container_name: medinsight-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      TELEGRAM_BOT_ENABLED: "true"
    command: ["python", "-m", "app.bot.main"]
    volumes:
      - medinsight-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - medinsight-net

  traefik:
    image: traefik:v3.5
    container_name: medinsight-traefik
    restart: unless-stopped
    profiles:
      - production
    command:
      # File provider (no Docker socket — avoids API version negotiation issues)
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik:/etc/traefik/dynamic:ro
      - traefik-certs:/letsencrypt
    depends_on:
      app:
        condition: service_healthy
    networks:
      - medinsight-net

  # --- Observability (OpenTelemetry tracing). Opt-in profile to keep the
  #     default footprint small: `docker compose --profile observability up -d`.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: medinsight-jaeger
    restart: unless-stopped
    profiles:
      - observability
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    ports:
      - "16686:16686"  # Jaeger UI
    volumes:
      - jaeger-data:/badger
    networks:
      - medinsight-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: medinsight-otel-collector
    restart: unless-stopped
    profiles:
      - observability
    command: ["--config", "/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # collector self-metrics
    depends_on:
      - jaeger
    networks:
      - medinsight-net

volumes:
  medinsight-data:
  medinsight-chroma:
  medinsight-backups:
  jaeger-data:
  traefik-certs:

networks:
  medinsight-net:
    driver: bridge
