services:
  redis:
    image: redis:7-alpine
    container_name: medinsight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medinsight-net

  app:
    build:
      context: .
      args:
        INSTALL_SPACY_MODEL: "0"
    container_name: medinsight-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      ENCRYPTION_KEY_PATH: /app/secrets/encryption_key.txt
      CHROMA_PERSIST_DIR: /app/chroma_data
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data
    depends_on:
      - redis
    networks:
      - medinsight-net

  celery_worker:
    build:
      context: .
      args:
        INSTALL_SPACY_MODEL: "0"
    container_name: medinsight-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      ENCRYPTION_KEY_PATH: /app/secrets/encryption_key.txt
      CHROMA_PERSIST_DIR: /app/chroma_data
    command: ["bash", "scripts/start_celery_worker.sh"]
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data
    depends_on:
      - redis
      - app
    networks:
      - medinsight-net

  celery_beat:
    build:
      context: .
      args:
        INSTALL_SPACY_MODEL: "0"
    container_name: medinsight-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
    command: ["bash", "scripts/start_celery_beat.sh"]
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data
    depends_on:
      - redis
      - app
    networks:
      - medinsight-net

  traefik:
    image: traefik:v3.2
    container_name: medinsight-traefik
    restart: unless-stopped
    profiles:
      - production
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - medinsight-net

volumes:
  medinsight-data:
  medinsight-chroma:
  traefik-certs:

networks:
  medinsight-net:
    driver: bridge
