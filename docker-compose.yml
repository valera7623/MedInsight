services:
  redis:
    image: redis:7-alpine
    container_name: medinsight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - medinsight-net

  app:
    build:
      context: .
      args:
        INSTALL_SPACY_MODEL: "0"
    container_name: medinsight-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      ENCRYPTION_KEY_PATH: /app/secrets/encryption_key.txt
      CHROMA_PERSIST_DIR: /app/chroma_data
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - medinsight-net

  celery_worker:
    build:
      context: .
      args:
        INSTALL_SPACY_MODEL: "0"
    container_name: medinsight-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      ENCRYPTION_KEY_PATH: /app/secrets/encryption_key.txt
      CHROMA_PERSIST_DIR: /app/chroma_data
    command: ["bash", "scripts/start_celery_worker.sh"]
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - medinsight-net

  celery_beat:
    build:
      context: .
      args:
        INSTALL_SPACY_MODEL: "0"
    container_name: medinsight-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/medinsight.db
      CHROMA_PERSIST_DIR: /app/chroma_data
    command: ["bash", "scripts/start_celery_beat.sh"]
    volumes:
      - medinsight-data:/app/data
      - medinsight-chroma:/app/chroma_data
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - medinsight-net

  traefik:
    image: traefik:v3.5
    container_name: medinsight-traefik
    restart: unless-stopped
    profiles:
      - production
    command:
      # File provider (no Docker socket — avoids API version negotiation issues)
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik:/etc/traefik/dynamic:ro
      - traefik-certs:/letsencrypt
    depends_on:
      app:
        condition: service_healthy
    networks:
      - medinsight-net

volumes:
  medinsight-data:
  medinsight-chroma:
  traefik-certs:

networks:
  medinsight-net:
    driver: bridge
